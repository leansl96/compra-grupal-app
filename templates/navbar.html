<nav class="navbar">

    <!-- LOGO -->
    <a href="{{ url_for('home') }}" class="logo">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo">
    </a>

    <!-- BUSCADOR -->
    <div class="nav-center">
        <form method="GET" action="{{ url_for('home') }}" class="search-box">
            <input 
                type="text" 
                name="q" 
                placeholder="Buscar productos..." 
                value="{{ request.args.get('q', '') }}"
            >
            <button type="submit" class="search-btn">🔍</button>
        </form>
    </div>

    <!-- USUARIO / ACCIONES -->
    <div class="nav-right">

        {% if session.get('usuario_id') %}

            <span class="user">
                👋 {{ session['usuario_nombre'] }}
            </span>

            <a href="{{ url_for('carrito') }}" class="nav-link">
                🛒 Carrito ({{ carrito_count }})
            </a>

            <a href="{{ url_for('logout') }}" class="nav-link logout">
                Cerrar sesión
            </a>

        {% else %}

            <a href="{{ url_for('login') }}" class="nav-link">
                Iniciar sesión
            </a>

            <a href="{{ url_for('register') }}" class="nav-link btn-register">
                Registrarse
            </a>

        {% endif %}

    </div>

</nav>
